[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
asyncio_mode = auto
addopts = -xvs --cov=src --cov-report=html --cov-report=term --cov-report=xml
markers =
    unit: unit tests
    integration: integration tests
    api: api tests
    snapshot: snapshot tests
    slow: marks tests as slow (deselect with '-m "not slow"') 